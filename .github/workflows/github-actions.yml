name: Payplug Woocommerce CI
### ---------|  CI workflow starting ---------| ###
on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened, closed]

jobs:
  # -----------------------------------------------------------------------
  # 0. APPLY RELEASE — update version files from release.json (release/* only)
  # -----------------------------------------------------------------------
  apply-release:
    if: startsWith(github.head_ref, 'release/') && github.event.action == 'opened'
    uses: payplug/template-ci/.github/workflows/wooco-apply-release.yml@main
    with:
      ref: ${{ github.head_ref }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # 1. QUALITY — static analysis & code style
  # -----------------------------------------------------------------------
  quality:
    if: github.event.action != 'closed'
    uses: payplug/template-ci/.github/workflows/wooco-php-quality.yml@main
    with:
      php-version: '7.2'

  # -----------------------------------------------------------------------
  # 2. CHECK PHP COMPATIBILITY — 5.6 to 8.1
  # -----------------------------------------------------------------------
  check-php-compatibility:
    if: github.event.action != 'closed'
    uses: payplug/template-ci/.github/workflows/check-php-compatibility.yml@main
    needs: quality
    with:
      php-version: '7.2'
      test-version-range: '5.6-8.1'
      src-folder: './src/'

  # -----------------------------------------------------------------------
  # 3. QA ZIP — build and upload a QA-ready zip artifact
  # -----------------------------------------------------------------------
  build-qa-zip:
    if: github.event.action != 'closed'
    uses: payplug/template-ci/.github/workflows/wooco-zip-generation.yml@main
    needs: [quality, check-php-compatibility]
    with:
      php-version: '7.2'
      node-version: '20'
    secrets:
      payplug-domain: ${{ secrets.PAYPLUG_DOMAIN_QA }}
      cdn-payplug: ${{ secrets.CDN_PAYPLUG_QA }}
      api-payplug: ${{ secrets.PAYPLUG_API_QA }}

  # -----------------------------------------------------------------------
  # 3. SONARCLOUD — code quality analysis
  # -----------------------------------------------------------------------
  sonarcloud:
    uses: payplug/template-ci/.github/workflows/sonarcloud.yml@main
    needs: build-qa-zip
    with:
      project-name: 'github-payplug-payplug-woocommerce'
      src-folder: 'src/'
    secrets:
      sonar-orga: ${{ secrets.SONAR_ORGA }}
      sonar-token: ${{ secrets.SONAR_TOKEN }}
