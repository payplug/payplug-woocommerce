name: WooCommerce — Release

on:
  push:
    branches:
      - master
      - develop
    tags:
      - '[0-9]+.[0-9]+.[0-9]+**'

jobs:
  # -----------------------------------------------------------------------
  # 1. BUILD QA ZIP — triggered on push to master (release/ or patch/ merges)
  # -----------------------------------------------------------------------
  build-qa-zip:
    name: Build QA zip
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: payplug/template-ci/.github/workflows/wooco-zip-generation.yml@main
    with:
      php-version: '7.2'
      node-version: '20'
      env: qa
      ref: refs/heads/master
    secrets:
      cdn-payplug: ${{ secrets.CDN_PAYPLUG_QA }}
      api-payplug: ${{ secrets.PAYPLUG_API_QA }}
      api-payplug-retail: ${{ secrets.API_RETAIL_QA }}

  # --------------------------------------------------------------------------------
  # 2. REUSE QA ARTIFACT — download from any PR run and re-upload on develop merge
  # --------------------------------------------------------------------------------
  reuse-qa-artifact-develop:
    name: Reuse QA artifact from merged branch (develop)
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Download most recent QA artifact from CI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: github-actions.yml
          name_is_regexp: true
          name: .*-QA
          path: artifact/

      - name: Flatten artifact directory
        run: |
          subdir=$(ls artifact/ | head -1)
          mv "artifact/$subdir"/* artifact/
          rm -rf "artifact/$subdir"

      - name: Re-upload artifact on develop push
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifact-develop
          path: artifact/
          retention-days: 7

  # -----------------------------------------------------------------------
  # 3. BUILD PROD ZIP — triggered on tag push
  # -----------------------------------------------------------------------
  build-prod-zip:
    name: Build prod zip
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: payplug/template-ci/.github/workflows/wooco-zip-generation.yml@main
    with:
      php-version: '7.2'
      node-version: '20'
      env: prod
      ref: ${{ github.ref }}
    secrets:
      cdn-payplug: ${{ secrets.CDN_PAYPLUG_PROD }}
      api-payplug: ${{ secrets.PAYPLUG_API_PROD }}
      api-payplug-retail: ${{ secrets.API_RETAIL_PROD }}
