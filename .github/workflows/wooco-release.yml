name: WooCommerce — Release

on:
  # Trigger 1: reuse QA artifact when a release/ branch is merged into master
  pull_request:
    branches:
      - master
    types: [closed]

  # Trigger 2: build prod zip when a tag is pushed
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+**'

jobs:
  # --------------------------------------------------------------------------------
  # 1. REUSE QA ARTIFACT — download from the release/ PR run and re-upload on master
  # --------------------------------------------------------------------------------
  reuse-qa-artifact:
    name: Reuse QA artifact from release branch
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Download QA artifact from release branch run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: github-actions.yml
          branch: ${{ github.head_ref }}
          name_is_regexp: true
          name: .*-QA
          path: artifact/

      - name: Sanitize branch name for artifact
        id: sanitize
        run: echo "artifact_name=qa-artifact-$(echo '${{ github.head_ref }}' | tr '/' '-')" >> $GITHUB_OUTPUT
      - name: Re-upload artifact on master merge
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.artifact_name }}
          path: artifact/
          retention-days: 7
  # -----------------------------------------------------------------------
  # 2. BUILD PROD ZIP — triggered on tag push
  # -----------------------------------------------------------------------
  build-prod-zip:
    name: Build prod zip
    if: github.event_name == 'push'
    uses: payplug/template-ci/.github/workflows/wooco-zip-generation.yml@main
    with:
      php-version: '7.2'
      node-version: '20'
      env: prod
      ref: ${{ github.ref }}
    secrets:
      cdn-payplug: ${{ secrets.CDN_PAYPLUG_PROD }}
      api-payplug: ${{ secrets.PAYPLUG_API_PROD }}
      api-payplug-retail: ${{ secrets.API_RETAIL_PROD }}
